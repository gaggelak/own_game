name: Deploy to GitHub Pages

# Build the web version and publish it to GitHub Pages on every push to main.
# The repo must be public (or have GitHub Pro), and Pages must be set to deploy
# from "GitHub Actions" (Settings → Pages → Source).

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you re-run a deploy by hand from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel a run mid-flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
